<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concepts Designs</title>
  <meta http-equiv="refresh" content="0; url=the-future.html">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background: #efefef;
      color: #0d0d0d;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      width: min(640px, 100%);
      background: #ffffff;
      border: 1px solid #c8c5be;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(13, 13, 13, 0.08);
    }
    .eyebrow {
      display: block;
      margin-bottom: 12px;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #cb333b;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 5vw, 48px);
      line-height: 1.05;
      font-weight: 500;
    }
    p {
      margin: 0 0 24px;
      color: #555550;
      line-height: 1.7;
    }
    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      border: 1px solid #c8c5be;
      color: #0d0d0d;
      background: #fff;
    }
    a.primary {
      background: #0d0d0d;
      border-color: #0d0d0d;
      color: #fff;
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="eyebrow">Concepts Designs</span>
    <h1>Redirecting to the main concept deck</h1>
    <p>If you are not redirected automatically, open the primary traveler AI concept or browse the standalone concept pages below.</p>
    <div class="links">
      <a class="primary" href="the-future.html">Open The Future</a>
      <a href="concepts_gallery.html">Open Gallery</a>
      <a href="voice_ui_concept.html">Open Voice UI Concept</a>
    </div>
  </main>
</body>
</html>
